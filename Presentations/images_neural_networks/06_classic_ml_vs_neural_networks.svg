<svg viewBox="0 0 850 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">⚖️ Classic ML vs. Neural Networks</text>
  <text x="425" y="55" text-anchor="middle" font-size="13" fill="#888">You already know the left side! Now you're learning the right side.</text>

  <!-- LEFT: Classic ML -->
  <rect x="30" y="75" width="370" height="285" rx="15" fill="#EBF5FB" stroke="#3498DB" stroke-width="2.5"/>
  <text x="215" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#2980B9">🧮 Classic ML</text>
  <text x="215" y="123" text-anchor="middle" font-size="12" fill="#7FB3D8">(What you've learned so far!)</text>

  <text x="55" y="155" font-size="13" fill="#2C3E50" font-weight="bold">Algorithms you know:</text>
  <text x="55" y="175" font-size="12" fill="#555">✅ Linear Regression</text>
  <text x="55" y="193" font-size="12" fill="#555">✅ KNN, Decision Trees, Random Forest</text>
  <text x="55" y="211" font-size="12" fill="#555">✅ Naïve Bayes, SVM, K-Means</text>

  <line x1="50" y1="225" x2="380" y2="225" stroke="#BDC3C7" stroke-width="1"/>

  <text x="55" y="248" font-size="13" fill="#2C3E50" font-weight="bold">Best for:</text>
  <text x="55" y="268" font-size="12" fill="#555">📊 Structured data (tables, spreadsheets)</text>
  <text x="55" y="286" font-size="12" fill="#555">📏 When you have clear features</text>
  <text x="55" y="304" font-size="12" fill="#555">⚡ Faster to train, easier to explain</text>
  <text x="55" y="322" font-size="12" fill="#555">📐 Works great with smaller datasets</text>
  <text x="55" y="345" font-size="12" fill="#27AE60" font-weight="bold">🎯 YOU pick the features!</text>

  <!-- VS circle -->
  <circle cx="425" cy="215" r="25" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <text x="425" y="220" text-anchor="middle" font-size="14" fill="white" font-weight="bold">VS</text>

  <!-- RIGHT: Neural Networks -->
  <rect x="450" y="75" width="370" height="285" rx="15" fill="#F5EEF8" stroke="#8E44AD" stroke-width="2.5"/>
  <text x="635" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#8E44AD">🧠 Neural Networks</text>
  <text x="635" y="123" text-anchor="middle" font-size="12" fill="#BB8FCE">(What you're learning now!)</text>

  <text x="475" y="155" font-size="13" fill="#2C3E50" font-weight="bold">Types you'll see:</text>
  <text x="475" y="175" font-size="12" fill="#555">🔮 Feedforward (basic neural net)</text>
  <text x="475" y="193" font-size="12" fill="#555">📸 CNNs (for images)</text>
  <text x="475" y="211" font-size="12" fill="#555">💬 Transformers (for text, like ChatGPT)</text>

  <line x1="470" y1="225" x2="800" y2="225" stroke="#BDC3C7" stroke-width="1"/>

  <text x="475" y="248" font-size="13" fill="#2C3E50" font-weight="bold">Best for:</text>
  <text x="475" y="268" font-size="12" fill="#555">📸 Images, audio, text, video</text>
  <text x="475" y="286" font-size="12" fill="#555">🔍 Complex patterns humans can't describe</text>
  <text x="475" y="304" font-size="12" fill="#555">🐢 Needs more data and compute power</text>
  <text x="475" y="322" font-size="12" fill="#555">📦 Powers most modern AI apps</text>
  <text x="475" y="345" font-size="12" fill="#8E44AD" font-weight="bold">🤖 Network FINDS its own features!</text>
</svg>
