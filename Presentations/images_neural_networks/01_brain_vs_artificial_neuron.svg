<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4169E1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">🧠 Brain Neuron vs. Artificial Neuron 🤖</text>

  <!-- LEFT SIDE: Brain Neuron -->
  <rect x="20" y="55" width="410" height="330" rx="15" fill="#FFF0F5" stroke="#FF69B4" stroke-width="2"/>
  <text x="225" y="85" text-anchor="middle" font-size="18" font-weight="bold" fill="#C71585">Biological Neuron (Your Brain)</text>

  <!-- Dendrites (inputs) -->
  <line x1="60" y1="160" x2="140" y2="200" stroke="#FF69B4" stroke-width="3"/>
  <line x1="60" y1="200" x2="140" y2="200" stroke="#FF69B4" stroke-width="3"/>
  <line x1="60" y1="240" x2="140" y2="200" stroke="#FF69B4" stroke-width="3"/>
  <text x="40" y="155" font-size="11" fill="#C71585" font-weight="bold">Signals</text>
  <text x="40" y="170" font-size="11" fill="#C71585" font-weight="bold">from</text>
  <text x="40" y="185" font-size="11" fill="#C71585" font-weight="bold">senses</text>
  <circle cx="60" cy="160" r="8" fill="#FFB6C1" stroke="#C71585" stroke-width="1.5"/>
  <circle cx="60" cy="200" r="8" fill="#FFB6C1" stroke="#C71585" stroke-width="1.5"/>
  <circle cx="60" cy="240" r="8" fill="#FFB6C1" stroke="#C71585" stroke-width="1.5"/>

  <!-- Cell body -->
  <circle cx="200" cy="200" r="45" fill="url(#brainGrad)" stroke="#C71585" stroke-width="2.5"/>
  <text x="200" y="195" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Cell</text>
  <text x="200" y="210" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Body</text>

  <!-- Axon (output) -->
  <line x1="245" y1="200" x2="370" y2="200" stroke="#FF69B4" stroke-width="4" stroke-dasharray="12,6"/>
  <polygon points="370,190 390,200 370,210" fill="#C71585"/>
  <text x="300" y="185" text-anchor="middle" font-size="11" fill="#C71585" font-weight="bold">Axon</text>

  <!-- Labels -->
  <text x="100" y="280" font-size="12" fill="#C71585" font-weight="bold">Dendrites</text>
  <text x="90" y="295" font-size="11" fill="#888">(receive signals)</text>
  <text x="300" y="240" font-size="12" fill="#C71585" font-weight="bold">Output Signal</text>
  <text x="300" y="255" font-size="11" fill="#888">(fires or doesn't)</text>

  <!-- Summary -->
  <text x="225" y="335" text-anchor="middle" font-size="13" fill="#333" font-style="italic">Receives signals → Processes → Sends output</text>
  <text x="225" y="355" text-anchor="middle" font-size="13" fill="#333" font-style="italic">~86 billion neurons in your brain!</text>

  <!-- EQUALS SIGN -->
  <text x="450" y="210" text-anchor="middle" font-size="40" fill="#666">≈</text>

  <!-- RIGHT SIDE: Artificial Neuron -->
  <rect x="470" y="55" width="410" height="330" rx="15" fill="#F0F8FF" stroke="#4169E1" stroke-width="2"/>
  <text x="675" y="85" text-anchor="middle" font-size="18" font-weight="bold" fill="#2E4A9E">Artificial Neuron (Computer)</text>

  <!-- Inputs -->
  <rect x="510" y="140" width="55" height="25" rx="5" fill="#87CEEB" stroke="#4169E1" stroke-width="1.5"/>
  <text x="537" y="157" text-anchor="middle" font-size="11" fill="#2E4A9E" font-weight="bold">x₁ = 0.8</text>
  <rect x="510" y="185" width="55" height="25" rx="5" fill="#87CEEB" stroke="#4169E1" stroke-width="1.5"/>
  <text x="537" y="202" text-anchor="middle" font-size="11" fill="#2E4A9E" font-weight="bold">x₂ = 0.3</text>
  <rect x="510" y="230" width="55" height="25" rx="5" fill="#87CEEB" stroke="#4169E1" stroke-width="1.5"/>
  <text x="537" y="247" text-anchor="middle" font-size="11" fill="#2E4A9E" font-weight="bold">x₃ = 0.5</text>

  <!-- Weights on connections -->
  <line x1="565" y1="152" x2="630" y2="200" stroke="#4169E1" stroke-width="2.5"/>
  <line x1="565" y1="197" x2="630" y2="200" stroke="#4169E1" stroke-width="2.5"/>
  <line x1="565" y1="242" x2="630" y2="200" stroke="#4169E1" stroke-width="2.5"/>
  <text x="590" y="162" font-size="10" fill="#E74C3C" font-weight="bold">w₁</text>
  <text x="585" y="195" font-size="10" fill="#E74C3C" font-weight="bold">w₂</text>
  <text x="590" y="240" font-size="10" fill="#E74C3C" font-weight="bold">w₃</text>

  <!-- Neuron circle -->
  <circle cx="670" cy="200" r="40" fill="url(#aiGrad)" stroke="#2E4A9E" stroke-width="2.5"/>
  <text x="670" y="195" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Process</text>
  <text x="670" y="210" text-anchor="middle" font-size="11" fill="white" font-weight="bold">& Decide</text>

  <!-- Output -->
  <line x1="710" y1="200" x2="810" y2="200" stroke="#4169E1" stroke-width="3"/>
  <polygon points="810,190 830,200 810,210" fill="#2E4A9E"/>
  <rect x="833" y="187" width="40" height="26" rx="5" fill="#4169E1"/>
  <text x="853" y="205" text-anchor="middle" font-size="12" fill="white" font-weight="bold">0.7</text>

  <!-- Labels -->
  <text x="537" y="275" text-anchor="middle" font-size="12" fill="#2E4A9E" font-weight="bold">Inputs</text>
  <text x="537" y="290" font-size="11" fill="#888">(numbers)</text>
  <text x="780" y="230" font-size="12" fill="#2E4A9E" font-weight="bold">Output</text>
  <text x="780" y="245" font-size="11" fill="#888">(a number)</text>

  <!-- Summary -->
  <text x="675" y="335" text-anchor="middle" font-size="13" fill="#333" font-style="italic">Receives numbers → Calculates → Outputs number</text>
  <text x="675" y="355" text-anchor="middle" font-size="13" fill="#333" font-style="italic">Millions of these in a neural network!</text>
</svg>
