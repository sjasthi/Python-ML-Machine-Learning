<svg viewBox="0 0 850 350" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">💡 Activation Functions: The "Should I Fire?" Decision</text>
  <text x="425" y="55" text-anchor="middle" font-size="13" fill="#888">Each neuron decides: Is the signal strong enough to pass along?</text>

  <!-- LEFT: Light Switch analogy -->
  <rect x="30" y="75" width="370" height="255" rx="15" fill="#FFF9E6" stroke="#F39C12" stroke-width="2"/>
  <text x="215" y="105" text-anchor="middle" font-size="17" font-weight="bold" fill="#E67E22">🔌 Simple Version: Light Switch</text>
  <text x="215" y="125" text-anchor="middle" font-size="12" fill="#888">(Step Function)</text>

  <!-- OFF state -->
  <rect x="60" y="145" width="130" height="100" rx="10" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="2"/>
  <text x="125" y="175" text-anchor="middle" font-size="35">🌑</text>
  <text x="125" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F8C8D">OFF (0)</text>
  <text x="125" y="225" text-anchor="middle" font-size="11" fill="#95A5A6">Signal too weak</text>
  <text x="125" y="240" text-anchor="middle" font-size="11" fill="#95A5A6">→ Don't pass it</text>

  <!-- ON state -->
  <rect x="240" y="145" width="130" height="100" rx="10" fill="#FEF9E7" stroke="#F1C40F" stroke-width="2"/>
  <text x="305" y="175" text-anchor="middle" font-size="35">💡</text>
  <text x="305" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#F39C12">ON (1)</text>
  <text x="305" y="225" text-anchor="middle" font-size="11" fill="#D4AC0D">Signal strong enough</text>
  <text x="305" y="240" text-anchor="middle" font-size="11" fill="#D4AC0D">→ Pass it along!</text>

  <!-- Divider text -->
  <text x="215" y="285" text-anchor="middle" font-size="12" fill="#E67E22" font-style="italic">Only ON or OFF. No in-between.</text>
  <text x="215" y="305" text-anchor="middle" font-size="12" fill="#E67E22" font-style="italic">Like a regular light switch.</text>

  <!-- VS -->
  <text x="425" y="210" text-anchor="middle" font-size="24" font-weight="bold" fill="#888">vs</text>

  <!-- RIGHT: Dimmer Switch analogy -->
  <rect x="450" y="75" width="370" height="255" rx="15" fill="#EBF5FB" stroke="#3498DB" stroke-width="2"/>
  <text x="635" y="105" text-anchor="middle" font-size="17" font-weight="bold" fill="#2980B9">🎚️ Better Version: Dimmer Switch</text>
  <text x="635" y="125" text-anchor="middle" font-size="12" fill="#888">(ReLU — what modern networks use)</text>

  <!-- Dimmer levels -->
  <rect x="480" y="145" width="80" height="80" rx="10" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="2"/>
  <text x="520" y="180" text-anchor="middle" font-size="24">🌑</text>
  <text x="520" y="205" text-anchor="middle" font-size="10" fill="#7F8C8D">Negative?</text>
  <text x="520" y="217" text-anchor="middle" font-size="10" font-weight="bold" fill="#7F8C8D">→ Output: 0</text>

  <rect x="575" y="145" width="80" height="80" rx="10" fill="#FEF9E7" stroke="#F1C40F" stroke-width="1.5"/>
  <text x="615" y="180" text-anchor="middle" font-size="24">🔅</text>
  <text x="615" y="205" text-anchor="middle" font-size="10" fill="#D4AC0D">Small +?</text>
  <text x="615" y="217" text-anchor="middle" font-size="10" font-weight="bold" fill="#D4AC0D">→ Low glow</text>

  <rect x="670" y="145" width="80" height="80" rx="10" fill="#F9E79F" stroke="#F39C12" stroke-width="2"/>
  <text x="710" y="180" text-anchor="middle" font-size="24">💡</text>
  <text x="710" y="205" text-anchor="middle" font-size="10" fill="#E67E22">Big +?</text>
  <text x="710" y="217" text-anchor="middle" font-size="10" font-weight="bold" fill="#E67E22">→ Bright!</text>

  <text x="765" y="180" text-anchor="middle" font-size="24">☀️</text>
  <text x="765" y="205" text-anchor="middle" font-size="10" fill="#E74C3C">Huge +?</text>
  <text x="765" y="217" text-anchor="middle" font-size="10" font-weight="bold" fill="#E74C3C">→ MAX!</text>

  <!-- Explanation -->
  <text x="635" y="260" text-anchor="middle" font-size="12" fill="#2980B9" font-style="italic">Bigger signal → brighter output.</text>
  <text x="635" y="278" text-anchor="middle" font-size="12" fill="#2980B9" font-style="italic">Negative signal → stays off (0).</text>
  <text x="635" y="298" text-anchor="middle" font-size="12" fill="#2980B9" font-style="italic">Like a dimmer switch on a lamp!</text>
</svg>
