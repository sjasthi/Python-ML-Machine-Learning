<svg viewBox="0 0 850 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="inputG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hiddenG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">🔗 Structure of a Neural Network</text>
  <text x="425" y="55" text-anchor="middle" font-size="13" fill="#888">Data flows left → right through layers of neurons</text>

  <!-- Connection lines (draw first so they appear behind circles) -->
  <!-- Input to Hidden 1 -->
  <g stroke="#ddd" stroke-width="1.5" opacity="0.6">
    <!-- i1 to h1 layer -->
    <line x1="175" y1="130" x2="330" y2="110"/>
    <line x1="175" y1="130" x2="330" y2="180"/>
    <line x1="175" y1="130" x2="330" y2="250"/>
    <line x1="175" y1="130" x2="330" y2="320"/>
    <line x1="175" y1="210" x2="330" y2="110"/>
    <line x1="175" y1="210" x2="330" y2="180"/>
    <line x1="175" y1="210" x2="330" y2="250"/>
    <line x1="175" y1="210" x2="330" y2="320"/>
    <line x1="175" y1="290" x2="330" y2="110"/>
    <line x1="175" y1="290" x2="330" y2="180"/>
    <line x1="175" y1="290" x2="330" y2="250"/>
    <line x1="175" y1="290" x2="330" y2="320"/>
    <!-- Hidden 1 to Hidden 2 -->
    <line x1="355" y1="110" x2="500" y2="130"/>
    <line x1="355" y1="110" x2="500" y2="210"/>
    <line x1="355" y1="110" x2="500" y2="290"/>
    <line x1="355" y1="180" x2="500" y2="130"/>
    <line x1="355" y1="180" x2="500" y2="210"/>
    <line x1="355" y1="180" x2="500" y2="290"/>
    <line x1="355" y1="250" x2="500" y2="130"/>
    <line x1="355" y1="250" x2="500" y2="210"/>
    <line x1="355" y1="250" x2="500" y2="290"/>
    <line x1="355" y1="320" x2="500" y2="130"/>
    <line x1="355" y1="320" x2="500" y2="210"/>
    <line x1="355" y1="320" x2="500" y2="290"/>
    <!-- Hidden 2 to Output -->
    <line x1="525" y1="130" x2="670" y2="175"/>
    <line x1="525" y1="130" x2="670" y2="245"/>
    <line x1="525" y1="210" x2="670" y2="175"/>
    <line x1="525" y1="210" x2="670" y2="245"/>
    <line x1="525" y1="290" x2="670" y2="175"/>
    <line x1="525" y1="290" x2="670" y2="245"/>
  </g>

  <!-- INPUT LAYER -->
  <circle cx="175" cy="130" r="24" fill="url(#inputG)" stroke="#0652DD" stroke-width="2"/>
  <text x="175" y="135" text-anchor="middle" font-size="11" fill="white" font-weight="bold">x₁</text>
  <circle cx="175" cy="210" r="24" fill="url(#inputG)" stroke="#0652DD" stroke-width="2"/>
  <text x="175" y="215" text-anchor="middle" font-size="11" fill="white" font-weight="bold">x₂</text>
  <circle cx="175" cy="290" r="24" fill="url(#inputG)" stroke="#0652DD" stroke-width="2"/>
  <text x="175" y="295" text-anchor="middle" font-size="11" fill="white" font-weight="bold">x₃</text>

  <!-- Input labels -->
  <text x="80" y="125" text-anchor="middle" font-size="11" fill="#0984e3">Pixel</text>
  <text x="80" y="138" text-anchor="middle" font-size="11" fill="#0984e3">values</text>
  <text x="80" y="205" text-anchor="middle" font-size="11" fill="#0984e3">Exam</text>
  <text x="80" y="218" text-anchor="middle" font-size="11" fill="#0984e3">scores</text>
  <text x="80" y="285" text-anchor="middle" font-size="11" fill="#0984e3">Sensor</text>
  <text x="80" y="298" text-anchor="middle" font-size="11" fill="#0984e3">readings</text>

  <!-- HIDDEN LAYER 1 -->
  <circle cx="340" cy="110" r="22" fill="url(#hiddenG)" stroke="#4834d4" stroke-width="2"/>
  <circle cx="340" cy="180" r="22" fill="url(#hiddenG)" stroke="#4834d4" stroke-width="2"/>
  <circle cx="340" cy="250" r="22" fill="url(#hiddenG)" stroke="#4834d4" stroke-width="2"/>
  <circle cx="340" cy="320" r="22" fill="url(#hiddenG)" stroke="#4834d4" stroke-width="2"/>

  <!-- HIDDEN LAYER 2 -->
  <circle cx="510" cy="130" r="22" fill="url(#hiddenG)" stroke="#4834d4" stroke-width="2"/>
  <circle cx="510" cy="210" r="22" fill="url(#hiddenG)" stroke="#4834d4" stroke-width="2"/>
  <circle cx="510" cy="290" r="22" fill="url(#hiddenG)" stroke="#4834d4" stroke-width="2"/>

  <!-- OUTPUT LAYER -->
  <circle cx="670" cy="175" r="24" fill="url(#outputG)" stroke="#009432" stroke-width="2"/>
  <text x="670" y="180" text-anchor="middle" font-size="11" fill="white" font-weight="bold">y₁</text>
  <circle cx="670" cy="245" r="24" fill="url(#outputG)" stroke="#009432" stroke-width="2"/>
  <text x="670" y="250" text-anchor="middle" font-size="11" fill="white" font-weight="bold">y₂</text>

  <!-- Output labels -->
  <text x="755" y="175" font-size="12" fill="#00b894" font-weight="bold">🐱 Cat: 95%</text>
  <text x="755" y="245" font-size="12" fill="#00b894" font-weight="bold">🐶 Dog: 5%</text>

  <!-- Layer Labels (at bottom) -->
  <rect x="130" y="360" width="90" height="40" rx="8" fill="#0984e3" opacity="0.9"/>
  <text x="175" y="378" text-anchor="middle" font-size="11" fill="white" font-weight="bold">INPUT</text>
  <text x="175" y="392" text-anchor="middle" font-size="10" fill="#dfe6e9">Layer</text>

  <rect x="370" y="360" width="130" height="40" rx="8" fill="#6c5ce7" opacity="0.9"/>
  <text x="435" y="378" text-anchor="middle" font-size="11" fill="white" font-weight="bold">HIDDEN LAYERS</text>
  <text x="435" y="392" text-anchor="middle" font-size="10" fill="#dfe6e9">(the "thinking")</text>

  <rect x="625" y="360" width="90" height="40" rx="8" fill="#00b894" opacity="0.9"/>
  <text x="670" y="378" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OUTPUT</text>
  <text x="670" y="392" text-anchor="middle" font-size="10" fill="#dfe6e9">Layer</text>

  <!-- Data flow arrow -->
  <text x="425" y="435" text-anchor="middle" font-size="13" fill="#555">Data flows: Input → Hidden (pattern finding) → Output (prediction)</text>
</svg>
