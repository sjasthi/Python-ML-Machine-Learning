<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="judgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">🏆 The "Talent Show Judges" Analogy 🏆</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" fill="#666">How a Neural Network Makes Decisions</text>

  <!-- Background -->
  <rect x="20" y="75" width="860" height="430" rx="15" fill="#FFFEF5" stroke="#FFA500" stroke-width="2"/>

  <!-- STEP 1: Input -->
  <text x="90" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#E67E22">STEP 1</text>
  <text x="90" y="128" text-anchor="middle" font-size="12" fill="#888">The Performance</text>

  <!-- Photo/Image icon -->
  <rect x="50" y="145" width="80" height="80" rx="10" fill="#FFF3CD" stroke="#E67E22" stroke-width="2"/>
  <text x="90" y="178" text-anchor="middle" font-size="30">🐱</text>
  <text x="90" y="200" text-anchor="middle" font-size="10" fill="#E67E22">Cat Photo</text>
  <text x="90" y="250" text-anchor="middle" font-size="11" fill="#555" font-style="italic">"Is this a cat</text>
  <text x="90" y="265" text-anchor="middle" font-size="11" fill="#555" font-style="italic">or a dog?"</text>

  <!-- Arrow to Round 1 -->
  <line x1="135" y1="185" x2="185" y2="185" stroke="#E67E22" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <defs><marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/></marker></defs>

  <!-- STEP 2: Round 1 Judges -->
  <text x="280" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#E67E22">STEP 2</text>
  <text x="280" y="128" text-anchor="middle" font-size="12" fill="#888">Round 1 Judges (Details)</text>

  <!-- Judge 1 -->
  <circle cx="220" cy="165" r="25" fill="url(#judgeGrad)" stroke="#D4A017" stroke-width="2"/>
  <text x="220" y="160" text-anchor="middle" font-size="16">👀</text>
  <text x="220" y="175" text-anchor="middle" font-size="7" fill="#8B6914" font-weight="bold">EARS</text>
  <text x="220" y="205" text-anchor="middle" font-size="9" fill="#555">"Pointy ears?</text>
  <text x="220" y="216" text-anchor="middle" font-size="9" fill="#555">YES! → 0.9"</text>

  <!-- Judge 2 -->
  <circle cx="280" cy="165" r="25" fill="url(#judgeGrad)" stroke="#D4A017" stroke-width="2"/>
  <text x="280" y="160" text-anchor="middle" font-size="16">👀</text>
  <text x="280" y="175" text-anchor="middle" font-size="7" fill="#8B6914" font-weight="bold">WHISKERS</text>
  <text x="280" y="205" text-anchor="middle" font-size="9" fill="#555">"Has whiskers?</text>
  <text x="280" y="216" text-anchor="middle" font-size="9" fill="#555">YES! → 0.8"</text>

  <!-- Judge 3 -->
  <circle cx="340" cy="165" r="25" fill="url(#judgeGrad)" stroke="#D4A017" stroke-width="2"/>
  <text x="340" y="160" text-anchor="middle" font-size="16">👀</text>
  <text x="340" y="175" text-anchor="middle" font-size="7" fill="#8B6914" font-weight="bold">SIZE</text>
  <text x="340" y="205" text-anchor="middle" font-size="9" fill="#555">"Small animal?</text>
  <text x="340" y="216" text-anchor="middle" font-size="9" fill="#555">YES! → 0.7"</text>

  <!-- Arrow to Round 2 -->
  <line x1="370" y1="185" x2="420" y2="185" stroke="#E67E22" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- STEP 3: Round 2 Judges -->
  <text x="510" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#E67E22">STEP 3</text>
  <text x="510" y="128" text-anchor="middle" font-size="12" fill="#888">Round 2 Judges (Patterns)</text>

  <!-- Judge 4 -->
  <circle cx="470" cy="165" r="25" fill="#98FB98" stroke="#228B22" stroke-width="2"/>
  <text x="470" y="160" text-anchor="middle" font-size="16">🧩</text>
  <text x="470" y="175" text-anchor="middle" font-size="7" fill="#228B22" font-weight="bold">CAT FACE?</text>
  <text x="470" y="205" text-anchor="middle" font-size="9" fill="#555">"Ears + whiskers</text>
  <text x="470" y="216" text-anchor="middle" font-size="9" fill="#555">= cat face → 0.9"</text>

  <!-- Judge 5 -->
  <circle cx="550" cy="165" r="25" fill="#98FB98" stroke="#228B22" stroke-width="2"/>
  <text x="550" y="160" text-anchor="middle" font-size="16">🧩</text>
  <text x="550" y="175" text-anchor="middle" font-size="7" fill="#228B22" font-weight="bold">DOG FACE?</text>
  <text x="550" y="205" text-anchor="middle" font-size="9" fill="#555">"Floppy ears +</text>
  <text x="550" y="216" text-anchor="middle" font-size="9" fill="#555">big nose? → 0.1"</text>

  <!-- Arrow to Final -->
  <line x1="580" y1="185" x2="630" y2="185" stroke="#E67E22" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- STEP 4: Final Decision -->
  <text x="740" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#E67E22">STEP 4</text>
  <text x="740" y="128" text-anchor="middle" font-size="12" fill="#888">Head Judge (Final Answer)</text>

  <circle cx="740" cy="175" r="35" fill="#FF6347" stroke="#CC3333" stroke-width="3"/>
  <text x="740" y="168" text-anchor="middle" font-size="20">🏅</text>
  <text x="740" y="185" text-anchor="middle" font-size="8" fill="white" font-weight="bold">VERDICT</text>

  <rect x="690" y="220" width="100" height="35" rx="8" fill="#27AE60" stroke="#1E8449" stroke-width="2"/>
  <text x="740" y="242" text-anchor="middle" font-size="14" fill="white" font-weight="bold">🐱 CAT! 95%</text>

  <!-- Bottom section: The Neural Network Translation -->
  <line x1="40" y1="295" x2="860" y2="295" stroke="#E67E22" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="450" y="320" text-anchor="middle" font-size="16" font-weight="bold" fill="#E67E22">🔄 Translating the Analogy to a Neural Network</text>

  <!-- Translation table -->
  <rect x="60" y="340" width="180" height="55" rx="8" fill="#FFF3CD" stroke="#E67E22" stroke-width="1.5"/>
  <text x="150" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#E67E22">🎤 The Performance</text>
  <text x="150" y="378" text-anchor="middle" font-size="12" fill="#555">= Input Layer</text>
  <text x="150" y="393" text-anchor="middle" font-size="10" fill="#888">(raw data goes in)</text>

  <rect x="270" y="340" width="180" height="55" rx="8" fill="#FFF3CD" stroke="#E67E22" stroke-width="1.5"/>
  <text x="360" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#E67E22">👀 Rounds of Judges</text>
  <text x="360" y="378" text-anchor="middle" font-size="12" fill="#555">= Hidden Layers</text>
  <text x="360" y="393" text-anchor="middle" font-size="10" fill="#888">(finding patterns)</text>

  <rect x="480" y="340" width="180" height="55" rx="8" fill="#FFF3CD" stroke="#E67E22" stroke-width="1.5"/>
  <text x="570" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#E67E22">🏅 Final Verdict</text>
  <text x="570" y="378" text-anchor="middle" font-size="12" fill="#555">= Output Layer</text>
  <text x="570" y="393" text-anchor="middle" font-size="10" fill="#888">(the prediction)</text>

  <rect x="690" y="340" width="170" height="55" rx="8" fill="#FFF3CD" stroke="#E67E22" stroke-width="1.5"/>
  <text x="775" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#E67E22">📝 Score Importance</text>
  <text x="775" y="378" text-anchor="middle" font-size="12" fill="#555">= Weights</text>
  <text x="775" y="393" text-anchor="middle" font-size="10" fill="#888">(how much to trust)</text>

  <!-- Bottom tagline -->
  <text x="450" y="470" text-anchor="middle" font-size="14" fill="#333" font-style="italic">Each "judge" specializes in one thing. Together, they make smart decisions!</text>
  <text x="450" y="492" text-anchor="middle" font-size="13" fill="#888">Just like your brain uses billions of neurons working together.</text>
</svg>
