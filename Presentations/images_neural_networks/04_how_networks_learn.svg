<svg viewBox="0 0 850 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">📚 How Neural Networks Learn (Training)</text>
  <text x="425" y="55" text-anchor="middle" font-size="14" fill="#888">Like studying for a test — practice, check answers, improve, repeat!</text>

  <!-- Background -->
  <rect x="20" y="70" width="810" height="310" rx="15" fill="#FAFAFA" stroke="#ddd" stroke-width="2"/>

  <!-- STEP 1 -->
  <rect x="45" y="100" width="150" height="120" rx="12" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="2"/>
  <text x="120" y="125" text-anchor="middle" font-size="28">📷</text>
  <text x="120" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#1ABC9C">1. SHOW DATA</text>
  <text x="120" y="172" text-anchor="middle" font-size="11" fill="#555">Feed a cat photo</text>
  <text x="120" y="187" text-anchor="middle" font-size="11" fill="#555">into the network</text>
  <text x="120" y="207" text-anchor="middle" font-size="10" fill="#888" font-style="italic">"Here's a picture.</text>
  <text x="120" y="219" text-anchor="middle" font-size="10" fill="#888" font-style="italic">What is it?"</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="160" x2="235" y2="160" stroke="#E67E22" stroke-width="2.5"/>
  <polygon points="235,153 248,160 235,167" fill="#E67E22"/>

  <!-- STEP 2 -->
  <rect x="250" y="100" width="150" height="120" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="2"/>
  <text x="325" y="125" text-anchor="middle" font-size="28">🤔</text>
  <text x="325" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#E67E22">2. MAKE A GUESS</text>
  <text x="325" y="172" text-anchor="middle" font-size="11" fill="#555">Network predicts:</text>
  <text x="325" y="190" text-anchor="middle" font-size="13" fill="#E74C3C" font-weight="bold">"I think... dog?"</text>
  <text x="325" y="210" text-anchor="middle" font-size="11" fill="#555">🐶 Dog: 60%</text>
  <text x="325" y="222" text-anchor="middle" font-size="11" fill="#555">🐱 Cat: 40%</text>

  <!-- Arrow 2→3 -->
  <line x1="405" y1="160" x2="440" y2="160" stroke="#E74C3C" stroke-width="2.5"/>
  <polygon points="440,153 453,160 440,167" fill="#E74C3C"/>

  <!-- STEP 3 -->
  <rect x="455" y="100" width="150" height="120" rx="12" fill="#FDEDEC" stroke="#E74C3C" stroke-width="2"/>
  <text x="530" y="125" text-anchor="middle" font-size="28">❌</text>
  <text x="530" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#E74C3C">3. CHECK ANSWER</text>
  <text x="530" y="172" text-anchor="middle" font-size="11" fill="#555">Compare to the</text>
  <text x="530" y="187" text-anchor="middle" font-size="11" fill="#555">correct answer:</text>
  <text x="530" y="207" text-anchor="middle" font-size="13" fill="#E74C3C" font-weight="bold">"WRONG! It's a cat"</text>
  <text x="530" y="222" text-anchor="middle" font-size="10" fill="#888">Error = how wrong</text>

  <!-- Arrow 3→4 -->
  <line x1="610" y1="160" x2="645" y2="160" stroke="#8E44AD" stroke-width="2.5"/>
  <polygon points="645,153 658,160 645,167" fill="#8E44AD"/>

  <!-- STEP 4 -->
  <rect x="660" y="100" width="150" height="120" rx="12" fill="#F4ECF7" stroke="#8E44AD" stroke-width="2"/>
  <text x="735" y="125" text-anchor="middle" font-size="28">🔧</text>
  <text x="735" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#8E44AD">4. ADJUST & LEARN</text>
  <text x="735" y="172" text-anchor="middle" font-size="11" fill="#555">Tweak the weights</text>
  <text x="735" y="187" text-anchor="middle" font-size="11" fill="#555">so next time it's</text>
  <text x="735" y="202" text-anchor="middle" font-size="11" fill="#555">more likely to</text>
  <text x="735" y="217" text-anchor="middle" font-size="11" fill="#555">say "cat" 🐱</text>

  <!-- REPEAT arrow (curves back from Step 4 to Step 1) -->
  <path d="M 735 225 Q 735 310 425 320 Q 120 310 120 225" fill="none" stroke="#2ECC71" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="120,235 113,225 127,225" fill="#2ECC71"/>

  <rect x="340" y="300" width="170" height="35" rx="10" fill="#2ECC71"/>
  <text x="425" y="322" text-anchor="middle" font-size="13" fill="white" font-weight="bold">🔄 REPEAT 1000s of times!</text>

  <!-- Bottom summary -->
  <text x="425" y="365" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">After thousands of examples, the network gets really good at its job!</text>
  <text x="425" y="385" text-anchor="middle" font-size="12" fill="#888">This is exactly how you learn — practice, make mistakes, improve, repeat.</text>
</svg>
